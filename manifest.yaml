name: supabase-self-hosted-starter
app: supabase
repository_type: single-app-template
starter_version: 0.1.0
last_updated: 2026-07-14
base_compose: compose.yaml
canonical_compose: compose.yaml
production_override: compose.prod.yaml
env_example: .env.example
runtime_tests: tests/runtime
test_framework: vitest

platform_templates:
  dokploy: dokploy/templates/full-local.json
  dokploy_variants:
    full-local: dokploy/templates/full-local.json
    full-external-s3: dokploy/templates/full-external-s3.json
    external-db-local: dokploy/templates/external-db-local.json
    external-db-external-s3: dokploy/templates/external-db-external-s3.json
    external-prebuilt-local: dokploy/templates/external-prebuilt-local.json
    external-prebuilt-external-s3: dokploy/templates/external-prebuilt-external-s3.json

services:
  supabase-kong:
    image: kong/kong:3.9.1
    role: public-api-gateway
    public: true
  supabase-studio:
    image: supabase/studio:2026.06.03-sha-0bca601
    role: dashboard
    public: behind-kong-basic-auth
  supabase-db:
    image: supabase/postgres:17.6.1.136
    role: database
    public: false
    persistent_volumes:
      - supabase-db-data
      - supabase-db-config
  supabase-analytics:
    image: supabase/logflare:1.31.2
    role: analytics-logs
    public: false
  supabase-vector:
    image: timberio/vector:0.53.0-alpine
    role: log-router
    public: false
  supabase-auth:
    image: supabase/gotrue:v2.189.0
    role: auth
    public: via-kong
  supabase-rest:
    image: postgrest/postgrest:v14.12
    role: rest-api
    public: via-kong
  realtime-dev:
    image: supabase/realtime:v2.102.3
    role: realtime
    public: via-kong
  supabase-storage:
    image: supabase/storage-api:v1.60.4
    role: storage-api
    public: via-kong
  supabase-minio:
    image: ghcr.io/coollabsio/minio:RELEASE.2025-10-15T17-29-55Z
    role: object-storage
    public: false
    persistent_volumes:
      - supabase-minio-data
  minio-createbucket:
    image: minio/mc
    role: object-storage-bootstrap
    public: false
  supabase-edge-functions:
    image: supabase/edge-runtime:v1.74.0
    role: edge-functions
    public: via-kong
  imgproxy:
    image: darthsim/imgproxy:v3.30.1
    role: image-transformer
    public: false
  supabase-meta:
    image: supabase/postgres-meta:v0.96.6
    role: postgres-admin-api
    public: via-kong-admin-acl
  supabase-supavisor:
    image: supabase/supavisor:2.9.5
    role: connection-pooler
    public: false

features:
  graphql: enabled
  cron: enabled
  smtp_default: disabled
  phone_signup_default: disabled
  modern_opaque_keys: gateway-mapped-to-legacy-jwt
  external_s3: compose.features.external-s3.yaml

variants:
  full:
    status: current-default
    topology: local-postgres-local-minio
    env_example: .env.full.example
    compose_files:
      - compose.yaml
      - compose.full.yaml
      - compose.prod.yaml
    env_generation: scripts/generate-env.sh --variant full
  external-db:
    status: supported-compose-overlay
    topology: external-postgres-with-bootstrap
    env_example: .env.external-db.example
    compose_files:
      - compose.yaml
      - compose.external-db.yaml
      - compose.prod.yaml
    env_generation: scripts/generate-env.sh --variant external-db
  external-prebuilt:
    status: supported-compose-overlay
    topology: external-postgres-managed-pooler-runtime-only
    env_example: .env.external-prebuilt.example
    compose_files:
      - compose.yaml
      - compose.external-prebuilt.yaml
      - compose.prod.yaml
    env_generation: scripts/generate-env.sh --variant external-prebuilt

feature_overlays:
  external-s3:
    status: base-compose
    topology: external-object-storage
    env_example: .env.external-s3.example
    compose_file: compose.features.external-s3.yaml
    env_generation: scripts/generate-env.sh --storage external-s3

required_runtime_validation:
  - docker compose --env-file .env.example -f compose.yaml config --quiet
  - docker compose --env-file .env.full.example -f compose.yaml -f compose.full.yaml config --quiet
  - docker compose --env-file .env.external-db.example -f compose.yaml -f compose.external-db.yaml config --quiet
  - docker compose --env-file .env.external-prebuilt.example -f compose.yaml -f compose.external-prebuilt.yaml config --quiet
  - docker compose --env-file .env.external-db.example --env-file .env.external-s3.example -f compose.yaml -f compose.external-db.yaml -f compose.features.external-s3.yaml config --quiet
  - docker compose --env-file .env.example -f compose.yaml -f compose.prod.yaml config --quiet
  - python3 -m json.tool dokploy/templates/full-local.json
  - npm --prefix tests/runtime run typecheck
  - ./scripts/validate.sh
