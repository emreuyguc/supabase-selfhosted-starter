services:
  supabase-minio:
    profiles:
    - local-storage-only

  minio-createbucket:
    profiles:
    - local-storage-only

  supabase-storage:
    depends_on: !override
      supabase-rest:
        condition: service_started
      imgproxy:
        condition: service_started
    environment:
    - SERVER_REGION=${STORAGE_S3_REGION}
    - REGION=${STORAGE_S3_REGION}
    - STORAGE_S3_BUCKET=${GLOBAL_S3_BUCKET}
    - STORAGE_S3_ENDPOINT=${STORAGE_S3_ENDPOINT}
    - STORAGE_S3_FORCE_PATH_STYLE=${STORAGE_S3_FORCE_PATH_STYLE}
    - STORAGE_S3_REGION=${STORAGE_S3_REGION}
    - AWS_ACCESS_KEY_ID=${STORAGE_S3_ACCESS_KEY_ID}
    - AWS_SECRET_ACCESS_KEY=${STORAGE_S3_SECRET_ACCESS_KEY}
